mode: ContinuousDeployment
next-version: 1.0.0
branches:
  main:
    regex: ^main$
    tag: ''
    increment: Patch
  master:
    regex: ^master$
    tag: ''
    increment: Patch
  release:
    regex: ^release[/-]
    tag: rc
    increment: Minor
  pull-request:
    tag: PullRequest
    increment: Inherit
ignore:
  sha: []
