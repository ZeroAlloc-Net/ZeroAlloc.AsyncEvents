name: Trigger Website

on:
  push:
    branches: [main]
    paths: ['docs/**']

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          repository: ZeroAlloc-Net/ZeroAlloc.AsyncEvents.website
          event-type: docs-updated
