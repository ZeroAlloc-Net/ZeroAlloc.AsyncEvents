name: CI

on:
  push:
    branches: [master, 'release/**']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools
        run: dotnet tool restore

      - name: Run GitVersion
        uses: gittools/actions/gitversion/execute@v3
        id: gitversion

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release /p:Version=${{ steps.gitversion.outputs.NuGetVersion }}

      - name: Test
        run: dotnet test --no-build -c Release

      - name: Pack
        run: dotnet pack src/ZeroAlloc.AsyncEvents/ZeroAlloc.AsyncEvents.csproj --no-build -c Release /p:Version=${{ steps.gitversion.outputs.NuGetVersion }} -o ./artifacts

      - name: Push pre-release to NuGet
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
